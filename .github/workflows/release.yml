name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release"
        required: true
jobs:
  release:
    name: Release
    runs-on: macOS-15-xlarge
    steps:
      - name: Check out repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Use Xcode 16.2.0
        run: sudo xcode-select -switch /Applications/Xcode_16.2.0.app

      - name: Validate version input
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ ${#VERSION} -gt 50 ]; then
            echo "::error::Version string exceeds maximum length of 50 characters"
            exit 1
          fi
          if ! echo "$VERSION" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-beta[0-9]+)?$'; then
            echo "::error::Version '$VERSION' does not match expected format (e.g. 3.0.0 or 3.0.0-beta1)"
            exit 1
          fi
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check for unreleased section in changelog
        run: grep "## unreleased" CHANGELOG.md || (echo "::error::No unreleased section found in CHANGELOG"; exit 1)

      - name: Set git username and email
        run: |
          git config user.name braintreeps
          git config user.email code@getbraintree.com

      - name: Update version
        run: |
          today=$(date +'%Y-%m-%d')
          sed -i '' 's/## unreleased.*/## '"${RELEASE_VERSION}"' ('"$today"')/' CHANGELOG.md
          sed -i '' 's/\(s\.version *= *\).*/\1"'"${RELEASE_VERSION}"'\"/' PopupBridge.podspec
          plutil -replace CFBundleVersion -string ${RELEASE_VERSION} -- 'Demo/Demo/Info.plist'
          plutil -replace CFBundleShortVersionString -string ${RELEASE_VERSION} -- 'Demo/Demo/Info.plist'
          plutil -replace CFBundleVersion -string ${RELEASE_VERSION} -- 'Sources/PopupBridge/PopupBridge-Framework-Info.plist'
          plutil -replace CFBundleShortVersionString -string ${RELEASE_VERSION} -- 'Sources/PopupBridge/PopupBridge-Framework-Info.plist'

          git add .
          git commit -m 'Bump version to ${RELEASE_VERSION}'
          git tag ${RELEASE_VERSION} -a -m 'Release ${RELEASE_VERSION}'

      - name: Push commits and tag
        run: git push origin HEAD ${RELEASE_VERSION}

      - name: Save changelog entries to a file
        run: |
          sed -e '1,/##/d' -e '/##/,$d' CHANGELOG.md > changelog_entries.md

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${RELEASE_VERSION}
          release_name: ${RELEASE_VERSION}
          body_path: changelog_entries.md
          draft: false
          prerelease: false

      - name: Publish to CocoaPods
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: pod trunk push PopupBridge.podspec
